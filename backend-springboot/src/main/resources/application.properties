spring.application.name=platform
server.port=8080

# SQLite Database configuration
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.url=jdbc:sqlite:../data/app.db

# HikariCP 连接池配置（SQLite优化：小池+WAL模式支持并发读）
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=PlatformHikariPool

# MyBatis-Plus configuration
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# File upload
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
upload.dir=../uploads

# 服务器线程池配置（高并发）
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=20
server.tomcat.accept-count=100
server.tomcat.max-connections=10000

# HTTP 压缩（提升传输效率）
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.compression.min-response-size=2048

# LLM 默认配置（从 .env 文件加载）
llm.default.api-key=${LLM_API_KEY:}
llm.default.base-url=${LLM_API_BASE_URL:https://api.deepseek.com}
llm.default.model=${LLM_MODEL:deepseek-chat}
llm.default.provider=${LLM_PROVIDER:deepseek}

# Embedding 默认配置（从 .env 文件加载）
embedding.default.api-key=${EMBEDDING_API_KEY:}
embedding.default.base-url=${EMBEDDING_API_BASE_URL:https://api.siliconflow.cn}
embedding.default.model=${EMBEDDING_MODEL:BAAI/bge-large-zh-v1.5}
